spring.application.name=gameboard-backend

# Profil par défaut : base Postgres locale (voir application-local.properties).
# CI / prod : export SPRING_PROFILES_ACTIVE=test (ou autre) avant de lancer l'app.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# Database H2 (dev)
spring.datasource.url=jdbc:h2:mem:gameboard
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Kafka (disabled for dev)
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
