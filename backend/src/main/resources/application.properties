spring.application.name=gameboard-backend

# ─────────────────────────────────────────────
# PostgreSQL
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/gameboard
spring.datasource.username=gameboard
spring.datasource.password=gameboard
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# Kafka
# ─────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=gameboard-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.gameboard.kafka

gameboard.kafka.topic.game-imported=game-imported

# ─────────────────────────────────────────────
# Auth0 — OAuth2 Resource Server (JWT)
# Remplacer YOUR_AUTH0_DOMAIN par ex: dev-xxxx.us.auth0.com
# ─────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://YOUR_AUTH0_DOMAIN/
spring.security.oauth2.resourceserver.jwt.audiences=YOUR_AUTH0_API_IDENTIFIER

# ─────────────────────────────────────────────
# Actuator
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info