# Dev : Postgres sur localhost:5432 (aligné sur le service postgres du compose à la racine du dépôt).
# Si Docker tourne, Spring démarre automatiquement ../docker-compose.yml au lancement (répertoire courant = backend/).
# On n'inclut pas le service « backend » du compose : tu lances l'app avec Maven sur la machine, pas en double conteneur.
# Pour désactiver : SPRING_DOCKER_COMPOSE_ENABLED=false puis lance Postgres à la main : docker compose up -d
spring.docker.compose.file=../docker-compose.yml
spring.docker.compose.services=postgres,zookeeper,kafka

# Surcharge possible : SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gameboard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gameboard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gameboard}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
